name: Course Availability Monitor

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  check-availability:
    name: Check Course Availability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # optional caching of pip dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore State Cache
        uses: actions/cache/restore@v4
        id: cache-state
        with:
          path: state
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Run Availability Monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          COURSE_URL: ${{ vars.COURSE_URL }}
          TARGET_CLASSES: ${{ vars.TARGET_CLASSES }}
        run: python monitor.py

      - name: Save State Cache
        uses: actions/cache/save@v4
        if: always() # Save cache even if script fails
        with:
          path: state
          key: monitor-state-${{ github.run_id }}
